version: 2.1

jobs:
  build:
    machine:
      image: ubuntu-2004:2024.05.1
      docker_layer_caching: true
    working_directory: ~/mentoring

    steps:
      # ----------------------------------------------
      # Git Setup
      # ----------------------------------------------
      - run:
          name: Configure git to use HTTPS
          command: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - checkout:
          path: ~/mentoring/

      # ----------------------------------------------
      # Install Mentoring dependencies
      # ----------------------------------------------
      - restore_cache:
          key: mentoring-dependency-cache-{{ checksum "src/package.json" }}

      - run:
          name: Install mentoring dependencies
          command: cd src/ && npm install

      - save_cache:
          key: mentoring-dependency-cache-{{ checksum "src/package.json" }}
          paths:
            - ./src/node_modules

      # ----------------------------------------------
      # Clone Required Microservices
      # ----------------------------------------------
      - run:
          name: Disable SSH rewrite
          command: git config --global --unset url."ssh://git@github.com".insteadOf || true

      - run:
          name: Clone User service
          command: cd ../ && git clone https://github.com/ELEVATE-Project/user.git --branch develop --single-branch

      - restore_cache:
          key: user-dependency-cache-{{ checksum "../user/src/package.json" }}

      - run:
          name: Install User service dependencies
          command: cd ../user/src/ && npm install

      - save_cache:
          key: user-dependency-cache-{{ checksum "../user/src/package.json" }}
          paths:
            - ../user/src/node_modules

      - run:
          name: Clone Scheduler service (optional)
          command: cd ../ && git clone https://github.com/ELEVATE-Project/scheduler.git --branch dev --single-branch || true

      - run:
          name: Clone Communications service
          command: cd ../ && git clone https://github.com/ELEVATE-Project/chat-communications.git --branch dev --single-branch || true

      # =============================================================
      # STARTUP: RUN DOCKER-COMPOSE STACK + HEALTH & PORT READINESS
      # =============================================================

      # ----------------------------------------------
      # Start docker-compose
      # ----------------------------------------------
      - run:
          name: Start docker-compose stack
          command: |
            cd dev-ops/
            echo "Pulling and building images..."
            docker-compose pull || true
            docker-compose build || true

            echo "Starting stack..."
            docker-compose up -d

            echo "Initial buffer..."
            sleep 10

      # ----------------------------------------------
      # Wait for Kafka, Redis, Citus healthchecks
      # ----------------------------------------------
      - run:
          name: Wait for core services (Kafka, Redis, Citus)
          command: |
            cd dev-ops/
            echo "Waiting for dependency services..."

            for i in {1..40}; do
              unhealthy=$(docker ps --filter "health=unhealthy" --format "{{.Names}}")
              starting=$(docker ps --filter "health=starting" --format "{{.Names}}")
              restarting=$(docker ps --filter "status=restarting" --format "{{.Names}}")

              if [ -z "$unhealthy" ] && [ -z "$starting" ] && [ -z "$restarting" ]; then
                echo "Dependency services healthy."
                break
              fi

              echo "Not ready yet (attempt $i)..."
              docker ps --format "table {{.Names}}\t{{.Status}}"
              sleep 5
            done

            echo "Final dependency statuses:"
            docker ps --format "table {{.Names}}\t{{.Status}}"

      # ----------------------------------------------
      # Wait for Mentoring (migrations + seeds + dev server)
      # ----------------------------------------------
      - run:
          name: Wait for Mentoring service (port 3000)
          command: |
            echo "Waiting for mentoring to finish migrations + start server (port 3000)..."

            for i in {1..80}; do
              if nc -z localhost 3000; then
                echo "Mentoring READY on port 3000."
                exit 0
              fi

              echo "Still waiting... ($i)"
              sleep 3
            done

            echo "ERROR: Mentoring never opened port 3000."
            echo "------ Mentoring Logs ------"
            docker logs mentoring || true
            exit 1

      # ----------------------------------------------
      # Wait for User service (port 3001)
      # ----------------------------------------------
      - run:
          name: Wait for User service (port 3001)
          command: |
            echo "Waiting for User service (port 3001)..."

            for i in {1..80}; do
              if nc -z localhost 3001; then
                echo "User service READY on port 3001."
                exit 0
              fi

              echo "Still waiting... ($i)"
              sleep 3
            done

            echo "ERROR: User service never opened port 3001."
            echo "------ User Logs ------"
            docker logs user || true
            exit 1


      # ----------------------------------------------
      # Dump logs on failure
      # ----------------------------------------------
      - run:
          name: Dump logs on failure
          when: on_fail
          command: |
            cd dev-ops/

            echo "===== Kafka Logs ====="
            docker-compose logs kafka || true

            echo "===== Citus Logs ====="
            docker-compose logs citus || true

            echo "===== Mentoring Logs ====="
            docker-compose logs mentoring || true

            echo "===== User Logs ====="
            docker-compose logs user || true

      # ----------------------------------------------
      # Run Integration Tests
      # ----------------------------------------------
      - run:
          name: Run integration tests
          command: |
            cd src/
            npm run test:integration

      - store_test_results:
          path: ./dev-ops/report


workflows:
  build-and-test:
    jobs:
      - build:
          filters:
            tags:
              only: \b(dev|develop|main)\b
