version: 2.1

jobs:
  build:
    machine:
      image: ubuntu-2004:2024.05.1
      docker_layer_caching: true
    working_directory: ~/mentoring

    steps:
      - checkout:
          path: ~/mentoring/

      # Install mentoring deps (optional for your verification)
      - run:
          name: Install Mentoring deps
          command: cd src/ && npm install

      # Clone User service + install deps
      - run:
          name: Clone User service
          command: cd ../ && git clone https://github.com/ELEVATE-Project/user.git --branch develop --single-branch

      - run:
          name: Install User deps
          command: cd ../user/src/ && npm install

      # -------------------------------
      # START DOCKER SERVICES
      # -------------------------------
      - run:
          name: Start docker-compose stack
          command: |
            cd dev-ops/
            docker-compose pull || true
            docker-compose build || true
            docker-compose up -d
            sleep 10

      # -------------------------------
      # Wait for Kafka / Citus / Redis
      # -------------------------------
      - run:
          name: Wait for core services
          command: |
            cd dev-ops/

            echo "Waiting for core services to become healthy..."

            for i in {1..40}; do
              unhealthy=$(docker ps --filter "health=unhealthy" --format "{{.Names}}")
              starting=$(docker ps --filter "health=starting" --format "{{.Names}}")
              restarting=$(docker ps --filter "status=restarting" --format "{{.Names}}")

              if [ -z "$unhealthy" ] && [ -z "$starting" ] && [ -z "$restarting" ]; then
                echo "Core dependencies healthy."
                break
              fi

              echo "Dependencies not ready yet... ($i)"
              docker ps --format "table {{.Names}}\t{{.Status}}"
              sleep 5
            done

      # -------------------------------
      # Wait for Mentoring (port 3000)
      # -------------------------------
      - run:
          name: Wait for Mentoring (port 3000)
          command: |
            echo "Waiting for Mentoring to open port 3000..."

            for i in {1..80}; do
              if nc -z localhost 3000; then
                echo "Mentoring is UP on port 3000."
                exit 0
              fi

              echo "Still waiting... ($i)"
              sleep 3
            done

            echo "ERROR: Mentoring did not start."
            docker logs mentoring || true
            exit 1

      # -------------------------------
      # Wait for User (port 3001)
      # -------------------------------
      - run:
          name: Wait for User (port 3001)
          command: |
            echo "Waiting for User service to open port 3001..."

            for i in {1..80}; do
              if nc -z localhost 3001; then
                echo "User service UP on port 3001."
                exit 0
              fi

              echo "Still waiting for user... ($i)"
              sleep 3
            done

            echo "ERROR: User service did not start."
            docker logs user || true
            exit 1

      # -------------------------------
      # Print final service logs
      # -------------------------------
      - run:
          name: Print service logs
          command: |
            cd dev-ops/
            echo "==== Mentoring Logs ===="
            docker-compose logs mentoring || true

            echo "==== User Logs ===="
            docker-compose logs user || true

            echo "==== Citus Logs ===="
            docker-compose logs citus || true

            echo "==== Kafka Logs ===="
            docker-compose logs kafka || true

            echo "==== Redis Logs ===="
            docker-compose logs redis || true

workflows:
  build-and-test:
    jobs:
      - build
