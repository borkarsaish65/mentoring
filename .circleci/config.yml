version: 2.1

jobs:
  build:
    machine:
      image: ubuntu-2004:2024.05.1
      docker_layer_caching: true

    working_directory: ~/mentoring

    steps:
      # ------------------------
      # Checkout
      # ------------------------
      - checkout

      # ------------------------
      # Install Mentoring deps
      # ------------------------
      - restore_cache:
          key: mentoring-deps-{{ checksum "src/package.json" }}

      - run:
          name: Install Mentoring dependencies
          command: |
            cd src
            npm install

      - save_cache:
          key: mentoring-deps-{{ checksum "src/package.json" }}
          paths:
            - src/node_modules

      # ------------------------
      # Clone dependent services
      # ------------------------
      - run:
          name: Clone User service
          command: |
            cd ..
            git clone https://github.com/ELEVATE-Project/user.git --branch mentoring_integration_test_setup --single-branch

      - restore_cache:
          key: user-deps-{{ checksum "../user/src/package.json" }}

      - run:
          name: Install User dependencies
          command: |
            cd ../user/src
            npm install

      - save_cache:
          key: user-deps-{{ checksum "../user/src/package.json" }}
          paths:
            - ../user/src/node_modules

      # ------------------------
      # Config
      # ------------------------
      - run:
          name: Copy integration config
          command: |
            cp dev-ops/sample_config.json src/config.json

      # ------------------------
      # Start infrastructure only
      # ------------------------
      - run:
          name: Start infrastructure containers
          command: |
            cd dev-ops
            docker-compose pull
            docker-compose build
            docker-compose up -d citus kafka redis

      # ------------------------
      # Wait for DB readiness
      # ------------------------
      - run:
          name: Wait for Postgres to accept connections
          command: |
            for i in {1..30}; do
              if docker exec citus pg_isready -U postgres; then
                echo "Database is ready"
                break
              fi
              echo "Waiting for database..."
              sleep 2
            done

      # ------------------------
      # Run migrations (CLI)
      # ------------------------
      - run:
          name: Run DB migrations
          command: |
            cd src
            npx sequelize-cli db:migrate --env integration

      # ------------------------
      # Run seeders (CLI)
      # ------------------------
      - run:
          name: Run DB seeders
          command: |
            cd src
            npx sequelize-cli db:seed:all --env integration

      # ------------------------
      # Start application services
      # ------------------------
      - run:
          name: Start application containers
          command: |
            cd dev-ops
            docker-compose up -d mentoring user

      # ------------------------
      # Optional: wait for app ports
      # ------------------------
      # - run:
      #     name: Wait for mentoring service
      #     command: |
      #       for i in {1..30}; do
      #         if curl -sf http://localhost:3000/health; then
      #           echo "Mentoring service is up"
      #           break
      #         fi
      #         sleep 2
      #       done

      # ------------------------
      # Run integration tests
      # ------------------------
      - run:
          name: Run integration tests
          command: |
            cd src
            npm run test:integration

      # ------------------------
      # Store results
      # ------------------------
      - store_test_results:
          path: dev-ops/report

workflows:
  build-and-test:
    jobs:
      - build:
          filters:
            branches:
              only:
                - dev
                - develop
                - main