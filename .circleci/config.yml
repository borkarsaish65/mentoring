version: 2.1

jobs:
  build:
    machine:
      image: ubuntu-2004:2024.05.1
      docker_layer_caching: true
    working_directory: ~/mentoring

    steps:
      - run:
          name: Configure git to use HTTPS
          command: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - checkout:
          path: ~/mentoring/

      # Restore mentoring dependencies
      - restore_cache:
          key: mentoring-dependency-cache-{{ checksum "src/package.json" }}

      - run:
          name: Install dependencies
          command: cd src/ && npm install

      - save_cache:
          key: mentoring-dependency-cache-{{ checksum "src/package.json" }}
          paths:
            - ./src/node_modules

      # Disable SSH rewrite
      - run:
          name: Disable SSH rewrite
          command: git config --global --unset url."ssh://git@github.com".insteadOf || true

      # Clone USER service
      - run:
          name: Clone User service
          command: cd ../ && git clone https://github.com/ELEVATE-Project/user.git --branch develop --single-branch

      - restore_cache:
          key: user-dependency-cache-{{ checksum "../user/src/package.json" }}

      - run:
          name: Install User service dependencies
          command: cd ../user/src/ && npm install

      - save_cache:
          key: user-dependency-cache-{{ checksum "../user/src/package.json" }}
          paths:
            - ../user/src/node_modules

      # Clone Scheduler service (optional)
      - run:
          name: Clone Scheduler service
          command: cd ../ && git clone https://github.com/ELEVATE-Project/scheduler.git --branch dev --single-branch || true

      # Clone Communications service
      - run:
          name: Clone Communications service
          command: cd ../ && git clone https://github.com/ELEVATE-Project/chat-communications.git --branch dev --single-branch || true

      # -------------------------------
      # FIXED: Start docker-compose (DETACHED)
      # -------------------------------
      - run:
          name: Start docker containers
          command: |
            cd dev-ops/
            docker-compose pull || true
            docker-compose build || true
            docker-compose up -d
            sleep 20

      # -------------------------------
      # FIXED: Wait for services to become healthy
      # -------------------------------
      - run:
          name: Wait for containers to become healthy
          command: |
            cd dev-ops/
            echo "Waiting for services to pass healthchecks..."
            
            for i in {1..30}; do
              unhealthy=$(docker ps --filter "health=unhealthy" --format "{{.Names}}")
              starting=$(docker ps --filter "health=starting" --format "{{.Names}}")

              if [ -z "$unhealthy" ] && [ -z "$starting" ]; then
                echo "All services healthy."
                break
              fi

              echo "Still waiting... (attempt $i)"
              docker ps --format "table {{.Names}}\t{{.Status}}"
              sleep 5
            done

            echo "Final container status:"
            docker ps --format "table {{.Names}}\t{{.Status}}"

      # -------------------------------
      # Diagnostics if services fail
      # -------------------------------
      - run:
          name: Print logs on failure
          when: always
          command: |
            cd dev-ops/
            echo "Kafka logs:"
            docker-compose logs --tail=200 kafka || true
            echo "Citus logs:"
            docker-compose logs --tail=200 citus || true
            echo "Mentoring logs:"
            docker-compose logs --tail=200 mentoring || true
            echo "User logs:"
            docker-compose logs --tail=200 user || true

      # -------------------------------
      # Run Integration Tests
      # -------------------------------
      - run:
          name: Running integration tests
          command: |
            cd src/
            npm run test:integration

      - store_test_results:
          path: ./dev-ops/report

workflows:
  build-and-test:
    jobs:
      - build:
          filters:
            tags:
              only: \b(dev|develop|main)\b
